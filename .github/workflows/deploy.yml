name: docker deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-24.04
    
    steps:
    - name: checkout
      uses: actions/checkout@v4

    - name: configure aws credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-west-2

    - name: login to ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1
      
    - name: docker login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    - name: build, tag, push
      run: docker build -t theneverendingstory/backend . && docker tag theneverendingstory/backend:latest 837720593432.dkr.ecr.us-west-2.amazonaws.com/theneverendingstory/backend:latest && docker push 837720593432.dkr.ecr.us-west-2.amazonaws.com/theneverendingstory/backend:latest
      
    - name: download task definition
      run: |
        aws ecs describe-task-definition --task-definition backend --query taskDefinition > task-definition.json
        
    - name: fill in task definition
      id: render-task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1.6.2
      with:
        task-definition: task-definition.json
        container-name: backend
        image: 837720593432.dkr.ecr.us-west-2.amazonaws.com/theneverendingstory/backend

    - name: deploy to ECS
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.render-task-def.outputs.task-definition }}
        service: backend
        cluster: the-neverending-story-cluster
        wait-for-service-stability: true
